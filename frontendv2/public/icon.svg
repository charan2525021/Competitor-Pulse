<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #111827; }
      .fg { stroke: white; fill: none; }
      .dot { fill: #6366f1; }
      .pulse { stroke: #6366f1; fill: none; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #6366f1; }
      .fg { stroke: white; fill: none; }
      .dot { fill: white; }
      .pulse { stroke: white; fill: none; }
    }
  </style>
  <rect class="bg" width="180" height="180" rx="37" />
  <!-- Crosshair lines -->
  <line class="fg" x1="90" y1="30" x2="90" y2="150" stroke-width="4" />
  <line class="fg" x1="30" y1="90" x2="150" y2="90" stroke-width="4" />
  <!-- Radar rings -->
  <circle class="fg" cx="90" cy="90" r="25" stroke-width="3.5" />
  <circle class="fg" cx="90" cy="90" r="48" stroke-width="3" />
  <!-- Center dot -->
  <circle class="dot" cx="90" cy="90" r="8" />
  <!-- Pulse arc (sweep indicator) -->
  <path class="pulse" d="M90 90 L90 42 A48 48 0 0 1 130 62 Z" fill-opacity="0.25" stroke-width="2" style="fill: currentColor; opacity: 0.2;" />
  <path class="pulse" d="M90 42 A48 48 0 0 1 130 62" stroke-width="4" stroke-linecap="round" />
</svg>